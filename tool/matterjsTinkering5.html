<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Matter.js Simple Example</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script>
        // Matter.js aliases for convenience
        var Engine = Matter.Engine,
            Runner = Matter.Runner;
            Render = Matter.Render,
            World = Matter.World,
            Bodies = Matter.Bodies,
            Composite = Matter.Composite,
            Mouse = Matter.Mouse,
            MouseConstraint = Matter.MouseConstraint,
            Composites = Matter.Composites,
            Body = Matter.Body,
            Common = Matter.Common
            Constraint = Matter.Constraint;

        // Create an engine & runner
        const engine = Engine.create();
        const runner = Runner.create();


        // Create a renderer
        var render = Render.create({
            element: document.body,
            engine: engine,
            options: {
                width: 800,
                height: 600,
                wireframes: false // Set to true to see wireframes instead of solid shapes
            }
        });

        // checks if boxA is touching the ground
        let onGround = false;
        Matter.Events.on(engine, "collisionStart", (event) => {
            event.pairs.forEach((pair) => {
                const a = pair.bodyA;
                const b = pair.bodyB;

                if ((a.label == "boxA" && b.label == "ground") || (b.label == "boxA" && a.label == "ground")) { // check for it both ways; if bodyA and bodyB are swapped
                    onGround = true;
                }
            });
        });
        Matter.Events.on(engine, "collisionEnd", (event) => {
            event.pairs.forEach((pair) => {
                const a = pair.bodyA;
                const b = pair.bodyB;

                if (!(a.label == "boxA" && b.label == "ground") || !(b.label == "boxA" && a.label == "ground")) { // check for it both ways; if bodyA and bodyB are swapped
                    onGround = false;
                }
            });
        });

        const keys = {}; // Track which keys are down

        document.addEventListener("keydown", (event) => { // code works when key is down
            keys[event.code] = true;
        });

        document.addEventListener("keyup", (event) => { // code stops working when you stop pressing the key
            keys[event.code] = false;
        });

        // Apply movement each tick
        Matter.Events.on(engine, "beforeUpdate", () => {
            const forceMagnitude = 0.005; // amount of force when key is pressed

            if (keys["ArrowUp"] && onGround) { // when up arrow is held down
                Body.applyForce(boxA, boxA.position, { x: 0, y: -100*forceMagnitude }); // puts the force on the shape consistently
            }
            if (keys["ArrowDown"]) {
                Body.applyForce(boxA, boxA.position, { x: 0, y: forceMagnitude });
            }
            if (keys["ArrowLeft"]) {
                Body.applyForce(boxA, boxA.position, { x: -forceMagnitude, y: 0 });
            }
            if (keys["ArrowRight"]) {
                Body.applyForce(boxA, boxA.position, { x: forceMagnitude, y: 0 });
            }
            if(keys["Space"]) {
                // Enables/disables collisions with other box
                if(boxA.collisionFilter.mask === GROUND){ // has to be === to check if it is exactly equal to
                    boxA.collisionFilter.mask = GROUND | OTHER;
                }
                else{ // if boxA.collisionFilter.mask & GROUND | OTHER;
                    boxA.collisionFilter.mask = GROUND
                }

                // // Create a new box at a random horizontal position
                // const newBox = Matter.Bodies.rectangle(
                //     Math.random() * 800, 0, Math.random() * 200, Math.random() * 80 + 50);
                // World.add(engine.world, newBox);
            }
        });


        // // example of how to make a box
        // var boxA = Bodies.rectangle(400, 200, 80, 80);
        // var boxB = Bodies.rectangle(450, 50, 80, 80);

        // collision filters
        const PLAYER = 0x0001;
        const OTHER = 0x0002;
        const GROUND = 0x0004;

        // Make bodies here

        var boxA = Bodies.rectangle(400, 200, 80, 80,{
            label: "boxA",
            collisionFilter: {
                category: PLAYER,
                mask: GROUND
            }
        });

        var boxB = Bodies.rectangle(600, 200, 80, 80, {
            collisionFilter: {
                category: OTHER,
                mask: PLAYER | GROUND
                // group: 1
            }
        });

        var ground = Bodies.rectangle(0, 590, 1610, 20,{
            isStatic: true, // isStatic prevents movement
            label: "ground",
            collisionFilter: {
                category: GROUND,
                // group: 1
            }
        });

        // // basic mouse function template
        // const mouse = Mouse.create(render.canvas);
        // const mouseConstraint = MouseConstraint.create(engine, {
        //     mouse: mouse, // makes the object dragging the objects the mouse
        //     constraint: {
        //         stiffness: 0.1, // changes how much force is used to drag the object to the mouse
        //         render: {
        //             visible: true // lets you see the object's connection to the mouse
        //         }
        //     }
        // });

        // Add all of the bodies to the world
        World.add(engine.world, [ground, boxA, boxB]);

        // Run the engine
        Runner.run(runner, engine);

        // Run the renderer
        Render.run(render);
    </script>
</body>
</html>
