<!DOCTYPE html>
<html>
    <head>
        <!-- Required meta tags -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
        <link href="style.css" rel="stylesheet" type="text/css" />
        <meta charset="UTF-8">
        <title>Matter.js Simple Example</title>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
        <style>
            body { margin: 0; overflow: hidden; }
            canvas { display: block; }
            #displayWinner {
                position: absolute;
                top: 20px;
                left: 50%;
                transform: translateX(-50%); /* to center properly */
                color: red;
                font-size: 150px;
            }
            #displayTimer {
                position: absolute;
                top: 10px;
                left: 25px;
                color: white;
                font-size: 50px;
            }
            #displayAction {
                position: absolute;
                top: 75px;
                left: 25px;
                color: white;
                font-size: 25px;
            }
        </style>        
        <title>Title</title>
    </head>
    <body>
        <!-- HTML -->
        <div id = "displayWinner"> </div> <!-- for displaying who wins -->
        <div id = "displayTimer"> </div> <!-- display time left to select action -->
        <div id = "displayAction"> </div> <!-- display what inputs were selected -->
        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
        <!-- <script src="script.js"></script> -->
        <script>
        // Matter.js aliases for convenience
        var Engine = Matter.Engine,
            Runner = Matter.Runner;
            Render = Matter.Render,
            World = Matter.World,
            Bodies = Matter.Bodies,
            Composite = Matter.Composite,
            Mouse = Matter.Mouse,
            MouseConstraint = Matter.MouseConstraint,
            Composites = Matter.Composites,
            Body = Matter.Body,
            Common = Matter.Common,
            Constraint = Matter.Constraint;

        // Create an engine & runner
        const engine = Engine.create();
        const runner = Runner.create();


        // Create a renderer
        var render = Render.create({
            element: document.body,
            engine: engine,
            options: {
                width: 1367, // William said make it 1367 because it concidentally fits perfectly
                height: 600,
                wireframes: false // Set to true to see wireframes instead of solid shapes
            }
        });

        // checks if current player is touching the ground
        let p1OnGround = false;
        let p2OnGround = false;
        let p1OnHead = false;
        let p2OnHead = false;
        Matter.Events.on(engine, "collisionStart", (event) => {
        event.pairs.forEach(({ bodyA, bodyB }) => {
            const labels = [bodyA.label, bodyB.label];
                // ground checks
                if (labels.includes("p1") && labels.includes("ground")) {
                    p1OnGround = true;
                }
                if (labels.includes("p2") && labels.includes("ground")) {
                    p2OnGround = true;
                }

                // on other's head checks
                if (labels.includes("p1") && labels.includes("p2") && (p1.position.y < p2.position.y)){
                    p1OnHead = true;
                }
                if (labels.includes("p2") && labels.includes("p1") && (p2.position.y < p1.position.y)){
                    p2OnHead = true;
                }
            }); 
        });

        Matter.Events.on(engine, "collisionEnd", (event) => {
            event.pairs.forEach(({ bodyA, bodyB }) => {
                const labels = [bodyA.label, bodyB.label];

                // ground checks
                if (labels.includes("p1") && labels.includes("ground")) {
                    p1OnGround = false;
                }
                if (labels.includes("p2") && labels.includes("ground")) {
                    p2OnGround = false;
                }

                // on other's head checks
                if (labels.includes("p1") && labels.includes("p2") && (p1.position.y < p2.position.y)){
                    p1OnHead = false;
                }
                if (labels.includes("p2") && labels.includes("p1") && (p2.position.y < p1.position.y)){
                    p2OnHead = false;
                }
            });
        });

        // // example of how to make a box
        // var boxA = Bodies.rectangle(400, 200, 80, 80);
        // var boxB = Bodies.rectangle(450, 50, 80, 80);

        // Make bodies here

        var ground = Bodies.rectangle(675, 500, 1000, 20, { isStatic: true,
        label: "ground"
         }); // isStatic prevents movement

        var p1 = Bodies.rectangle(250, 400, 100, 100, {
            label: "p1"
        }); // player 1

        var p2 = Bodies.rectangle(1100, 400, 100, 100, {
            label: "p2"
        }); // player 2

        let input = []; // track the input(s) the player put in

        const keys = {}; // Track which keys are down

        var pCurrent = p2
        var winner = " " // to track who won the round and prevent winenr from changing if other player falls off after
        var spacePressed = false; // to prevent pressing space from swapping `pCurrent` every tick
        let run = false; // variable to pause/start engine

        // Apply movement each tick
        Matter.Events.on(engine, "beforeUpdate", () => {
            // end game
            if(p1.position.y > 800 && winner != "p1"){
                console.log("p2 wins");
                winner = "p2";
                document.getElementById("displayWinner").innerText = winner + " wins";
            }
            else if(p2.position.y > 800 && winner != "p2"){
                console.log("p1 wins");
                winner = "p1";
                document.getElementById("displayWinner").innerText = winner + " wins";
            }
        });

        // resume game and swap players
        document.addEventListener("keydown", (event) => {
            if (!runner.enabled) return; // only allow input during the turn

            let currentGrounded = pCurrent.label == "p1" ? p1OnGround : p2OnGround;
            let currentOnHead   = pCurrent.label == "p1" ? p1OnHead   : p2OnHead;

            // up
            if (event.code == "ArrowUp" && (currentGrounded || currentOnHead)) {

                input = input.filter(x => x !== "down"); // remove opposite

                if (currentOnHead) {
                    // clear all other inputs if same input pressed multiple times
                    if (input.includes("jumpOnHead")) {
                        input = []
                    }
                    input.push("jumpOnHead");

                } else {
                    // clear all other inputs if same input pressed multiple times
                    if (input.includes("jump")) {
                        input = [];
                    }
                    input.push("jump");
                }
            }

            // down
            if (event.code == "ArrowDown") {

                input = input.filter(x => x !== "jump" && x !== "jumpOnHead"); // remove opposite

                // clear all other inputs if same input pressed multiple times
                if (input.includes("down")) {
                    input = [];
                }
                input.push("down");
            }

            // left
            if (event.code == "ArrowLeft") {

                input = input.filter(x => x !== "right"); // remove opposite

                // clear all other inputs if same input pressed multiple times
                if (input.includes("left")) {
                    input = [];
                }
                input.push("left");
            }

            // right
            if (event.code == "ArrowRight") {

                input = input.filter(x => x !== "left"); // remove opposite

                // clear all other inputs if same input pressed multiple times
                if (input.includes("right")) {
                    input = [];
                }
                input.push("right");
            }

            // Update UI
            document.getElementById("displayAction").innerText =
                "Action: " + input.join(" + ");

            // Ending turn/starting next turn
            if (event.code == "Space" && !spacePressed) {
                spacePressed = true; // prevents constant toggling
                if (pCurrent == p1) {
                    pCurrent = p2;
                }
                else if (pCurrent == p2) {
                    pCurrent = p1;
                }

                // reset inputs when next turn starts
                input = [];
                document.getElementById("displayAction").innerText = "Action: ";

                startCountDown(); // start the timer again 
            }
        });
  
        // for pausing
        let countDown = 5;
        let countDownStored = null; // to store the count down function
        function startCountDown() {
            // prevent multiple intervals running at once
            if (countDownStored != null) return; // ends the loop if it tries to run again while already running

            countDownStored = setInterval(() => {
                if (countDown > 0) {
                    countDown -= 0.01;
                    document.getElementById("displayTimer").innerText = countDown.toFixed(2) + "s";
                    // console.log(countDown) // for testing
                } else {
                    runInputs() // apply movement when input phase is over

                    runner.enabled = false;
                    countDown = 5;
                    clearInterval(countDownStored);
                    countDownStored = null; // allow the function to run again
                    spacePressed = false; // allow space to be pressed again
                    document.getElementById("displayTimer").innerText = 0.00 + " s";                    

                }
            }, 10);
        }

        function runInputs() {
            runner.enabled = true; // un-pause the engine allowing for the inputs to happen

            const forceMagnitude = 0.1; // amount of force when key is pressed

            let currentOnHead = pCurrent.label == "p1" ? p1OnHead : p2OnHead // checks which is current object

            if (input.includes("jump") || input.includes("jumpOnHead")) {
                Body.applyForce(pCurrent, pCurrent.position, { x: 0, y: -50 * forceMagnitude });
                if(currentOnHead && (pCurrent == p1)){
                    Body.applyForce(p2, p2.position, {x: 0, y: 25 * forceMagnitude});
                }
                else if(currentOnHead && (pCurrent == p2)){
                    Body.applyForce(p1, p1.position, {x: 0, y: 25 * forceMagnitude});
                }
            }

            if (input.includes("down")) {
                Body.applyForce(pCurrent, pCurrent.position, { x: 0, y: forceMagnitude });
            }
            if (input.includes("left")) {
                Body.applyForce(pCurrent, pCurrent.position, { x: -forceMagnitude, y: 0 });
            }
            if (input.includes("right")) {
                Body.applyForce(pCurrent, pCurrent.position, { x: forceMagnitude, y: 0 });
            }
        }
    
        // // basic mouse function template
        // const mouse = Mouse.create(render.canvas);
        // const mouseConstraint = MouseConstraint.create(engine, {
        //     mouse: mouse, // makes the object dragging the objects the mouse
        //     constraint: {
        //         stiffness: 0.1, // changes how much force is used to drag the object to the mouse
        //         render: {
        //             visible: true // lets you see the object's connection to the mouse
        //         }
        //     }
        // });

        // Add all of the bodies to the world
        World.add(engine.world, [ground, p1, p2]);

        // Run the engine
        Runner.run(runner, engine);

        // Run the renderer
        Render.run(render);
    </script>
    </body>
</html>
