<!DOCTYPE html>
<html>
    <head>
        <!-- Required meta tags -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
        <link href="style.css" rel="stylesheet" type="text/css" />
        <meta charset="UTF-8">
        <title>Matter.js Simple Example</title>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
        <style>
            body { margin: 0; overflow: hidden; }
            canvas { display: block; }
            #displayWinner {
                position: absolute;
                top: 20px;
                left: 50%;
                transform: translateX(-50%); /* to center properly */
                color: red;
                font-size: 150px;
            }
            #displayTimer {
                position: absolute;
                top: 10px;
                left: 25px;
                color: white;
                font-size: 50px;
            }
            #displayAction {
                position: absolute;
                top: 75px;
                left: 25px;
                color: white;
                font-size: 25px;
            }
        </style>        
        <title>Title</title>
    </head>
    <body>
        <!-- HTML -->
        <div id = "displayWinner"> </div> <!-- for displaying who wins -->
        <div id = "displayTimer"> </div> <!-- display time left to select action -->
        <div id = "displayAction"> </div> <!-- display what inputs were selected -->
        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
        <!-- <script src="script.js"></script> -->
        <script>
        // Matter.js aliases for convenience
        var Engine = Matter.Engine,
            Runner = Matter.Runner;
            Render = Matter.Render,
            World = Matter.World,
            Bodies = Matter.Bodies,
            Composite = Matter.Composite,
            Mouse = Matter.Mouse,
            MouseConstraint = Matter.MouseConstraint,
            Composites = Matter.Composites,
            Body = Matter.Body,
            Common = Matter.Common,
            Constraint = Matter.Constraint;

        // Create an engine & runner
        const engine = Engine.create();
        const runner = Runner.create();


        // Create a renderer
        var render = Render.create({
            element: document.body,
            engine: engine,
            options: {
                width: 1367, // William said make it 1367 because it concidentally fits perfectly
                height: 600,
                wireframes: false // Set to true to see wireframes instead of solid shapes
            }
        });

        // to keep track of timing and keep everything in sync
        let movementPhase = false;
        let movementTime = 0;

        // to keep track of if both players have puyt in their inputs
        let p1Ready = false;
        let p2Ready = false;


        // checks if current player is touching the ground
        let p1OnGround = false;
        let p2OnGround = false;
        let p1OnHead = false;
        let p2OnHead = false;
        Matter.Events.on(engine, "collisionStart", (event) => {
            event.pairs.forEach(({ bodyA, bodyB }) => {
                const labels = [bodyA.label, bodyB.label];

                if (labels.includes("p1Sensor") && labels.includes("p2Sensor")) {return;} // prevent collisions between the 2 sensors for both players

                // ground checks
                if ((labels.includes("p1") || labels.includes("p1Sensor")) && labels.includes("ground")) {
                    p1OnGround = true;
                }
                if ((labels.includes("p2") || labels.includes("p2Sensor")) && labels.includes("ground")) {
                    p2OnGround = true;
                }

                // on other's head checks
                if ((labels.includes("p1Sensor")) && labels.includes("p2") && (p1.position.y < p2.position.y)) {
                    p1OnHead = true;
                    // stomping mechanic
                    if (phase === "movement" && p1Input.includes("down")) {
                        Body.setDensity(p2, p2.density * 0.90);
                        Body.scale(p2, 0.90, 0.90); // size change (also affects density/weight)
                        Body.scale(p2Sensor, 0.90, 0.90); 
                    }
                }
                if ((labels.includes("p2Sensor")) && labels.includes("p1") && (p2.position.y < p1.position.y)) {
                    p2OnHead = true;
                    // stomping mechanic
                    if (phase === "movement" && p2Input.includes("down")) {
                        Body.setDensity(p1, p1.density * 0.90); // density or weight change
                        Body.scale(p1, 0.90, 0.90); // size change (also affects density/weight)
                        Body.scale(p1Sensor, 0.90, 0.90); 
                    }
                }
            }); 
        });

        Matter.Events.on(engine, "collisionEnd", (event) => {
            event.pairs.forEach(({ bodyA, bodyB }) => {
                const labels = [bodyA.label, bodyB.label];

                // ground checks
                if (labels.includes("p1") && labels.includes("groundSensor")) {
                    p1OnGround = false;
                }
                if (labels.includes("p2") && labels.includes("groundSensor")) {
                    p2OnGround = false;
                }

                // on other's head checks
                if (labels.includes("p1") && labels.includes("p2")) {
                    p1OnHead = false;
                    p2OnHead = false;
                }
            });
        });

        // // example of how to make a box
        // var boxA = Bodies.rectangle(400, 200, 80, 80);
        // var boxB = Bodies.rectangle(450, 50, 80, 80);


        const PLAYER = 0x0001;
        const GROUND = 0x0002;
        const GHOST  = 0x0004;
        // Make bodies here

        // ground
        var ground = Bodies.rectangle(675, 500, 1000, 20, {
            isStatic: true, // isStatic prevents movement
            label: "ground",
            collisionFilter: {
                category: GROUND,
                mask: PLAYER // players collide with ground
            }
        }); 
        var groundHitbox = Bodies.rectangle(675, 490, 1050, 50, { // for jumping
            isStatic: true,
            label: "groundSensor",
            isSensor: true, // allows to still detect collisions without actually colliding
            collisionFilter: {
                category: GHOST,
                mask: PLAYER // collide with nothing, but still triggers events with players
            },
            render: {visible: false} // make the body invisible 
        });

        // player 1
        var p1 = Bodies.rectangle(250, 400, 100, 100, {
            friction: 0.01,
            label: "p1",
            collisionFilter: {
                category: PLAYER,
                mask: PLAYER | GROUND | GHOST
            }
        });

        // player 2
        var p2 = Bodies.rectangle(1100, 400, 100, 100, {
            friction: 0.01,
            label: "p2",
            collisionFilter: {
                category: PLAYER,
                mask: PLAYER | GROUND | GHOST
            }
        });

        // player 1 sensor
        var p1Sensor = Bodies.rectangle(250, 400, 140, 140, {
            label: "p1Sensor",
            isSensor: true, // allows to still detect collisions without actually colliding 
             collisionFilter: {
                category: GHOST,
                mask: PLAYER // only collide with real player
            },
            // to prevent sensor bodies from sliding down the screen
            inertia: Infinity,
            frictionAir: 0,

            render: {visible: false} // make the body invisible 
        });

        // player 2 sensor
        var p2Sensor = Bodies.rectangle(1100, 400, 140, 140, {
            label: "p2Sensor",
            isSensor: true, // allows to still detect collisions without actually colliding 
             collisionFilter: {
                category: GHOST,
                mask: PLAYER // only collide with real player
            },
            // to prevent sensor bodies from sliding down the screen
            inertia: Infinity,
            frictionAir: 0,
            
            render: {visible: false} // make the body invisible 
        });

        // track the input(s) the players put in
        let p1Input = [];
        let p2Input = [];


        const keys = {}; // Track which keys are down

        var pCurrent = p1;
        var winner = " " // to track who won the round and prevent winenr from changing if other player falls off after
        var spacePressed = false; // to prevent pressing space from swapping `pCurrent` every tick
        let phase = "input"; // to keep track of phase and help prevent the bug with movement phase starting immideiatley after p2's input phase ends
        let run = false; // variable to pause/start engine

        // Apply movement each tick
        Matter.Events.on(engine, "beforeUpdate", (event) => {

            // update `p1Sensor` to `p1` position & prevent it from offsetting itself from velocity
            Body.setPosition(p1Sensor, p1.position);
            Body.setAngle(p1Sensor, p1.angle);
            Body.setVelocity(p1Sensor, { x: 0, y: 0 });
            Body.setAngularVelocity(p1Sensor, 0);


            // update `p2Sensor` to `p2` position & prevent it from offsetting itself from velocity
            Body.setPosition(p2Sensor, p2.position);
            Body.setAngle(p2Sensor, p2.angle);
            Body.setVelocity(p2Sensor, { x: 0, y: 0 });
            Body.setAngularVelocity(p2Sensor, 0);

            // end game
            if(p1.position.y > 800 && winner != "p1"){
                console.log("p2 wins");
                winner = "p2";
                document.getElementById("displayWinner").innerText = winner + " wins";
            }
            else if(p2.position.y > 800 && winner != "p2"){
                console.log("p1 wins");
                winner = "p1";
                document.getElementById("displayWinner").innerText = winner + " wins";
            }
        });

        Matter.Events.on(engine, "afterUpdate", (event) => {
            if (!movementPhase) return; // prevents running while movement phase active

            movementTime += event.delta; // add milliseconds since last tick; delta is time since last tick in the engine

            if (movementTime >= 750) { // 0.75 seconds of time has passed
                movementPhase = false;
                runner.enabled = false; // pause engine EXACTLY on time

                // Reset for next round
                p1Ready = false;
                p2Ready = false;
                pCurrent = p1; // or whoever starts next round
                spacePressed = false;
                phase = "input"; // go back to input phases
                // clear inputs
                p1Input = [];
                p2Input = [];

                movementTime = 0; // reset timer
            }
        });

        document.addEventListener("keydown", (event) => {

            // Ending turn/starting next turn
            if (event.code == "Space" && !spacePressed) {
                spacePressed = true; // prevents constant toggling

                // If both players are ready, Space starts the movement phase
                if (p1Ready && p2Ready && countDownStored == null) {
                    startMovementPhase();
                    return; // prevent count down phase
                }

                if (countDownStored == null) {
                    countdownFor = pCurrent;
                    startCountDown();
                }

                document.getElementById("displayAction").innerText = "Action: ";
                return; // to help prevent errors related to changing turns
            }

            if (movementPhase) return; // prevent inputs during the movement phase

            inputFunction(pCurrent == p1 ? p1Input : p2Input, event); // runs the function for p1/p2 depending on which one is the current player
        });
  
        // for pausing
        let countDown = 5;
        let countDownStored = null; // to store the count down function
        function startCountDown() {
            // prevent multiple intervals running at once
            if (countDownStored != null) return; // ends the loop if it tries to run again while already running

            countDownStored = setInterval(() => {
                if (countDown > 0) {
                    countDown -= 0.01;
                    document.getElementById("displayTimer").innerText = countDown.toFixed(2) + "s";
                    // console.log(countDown) // for testing
                } else {
                    finishCountdown();

                    countDown = 5;
                    clearInterval(countDownStored);
                    countDownStored = null; // allow the function to run again
                    document.getElementById("displayTimer").innerText = "0.00 s";
                    document.getElementById("displayAction").innerText = "Action: "; // prevent pervious players actions from being displayed if timer is up              
                }
            }, 10);
        }

        function finishCountdown() {
            if (countdownFor == p1) {
                p1Ready = true;
            } 
            else {
                p2Ready = true;
            }

            pCurrent = (pCurrent == p1) ? p2 : p1;
            spacePressed = false; // allow Space to be pressed again
        }

        function inputFunction(playerInputs, event) {
            const currentGrounded = (pCurrent == p1) ? p1OnGround : p2OnGround;
            const currentOnHead   = (pCurrent == p1) ? p1OnHead   : p2OnHead;

            // Up
            if (event.code == "ArrowUp" && (currentGrounded || currentOnHead)) {
                // remove down
                const withoutDown = playerInputs.filter(x => x !== "down"); // remake copy of array
                playerInputs.length = 0; // empty array
                playerInputs.push(...withoutDown); // add back the copy of the array to the normal array; the `...` splits the array into individual arguments

                if (currentOnHead) {
                    // if jumpOnHead already present, clear array
                    if (playerInputs.includes("jumpOnHead")) {
                        playerInputs.length = 0; // empty array
                    }
                    playerInputs.push("jumpOnHead"); // add jumpOnHead
                } else {
                    // if jump already present, clear array
                    if (playerInputs.includes("jump")) {
                        playerInputs.length = 0; // empty array
                    }
                    playerInputs.push("jump"); // add jump
                }
            }

            // Down
            if (event.code == "ArrowDown") {
                // remove jump and jumpOnHead
                const withoutJumps = playerInputs.filter(x => x !== "jump" && x !== "jumpOnHead"); // remake copy of array
                playerInputs.length = 0; // empty array
                playerInputs.push(...withoutJumps); // add back the copy of the array to the normal array; the `...` splits the array into individual arguments

                // if down already present, clear array
                if (playerInputs.includes("down")) {
                    playerInputs.length = 0; // empty array
                }
                playerInputs.push("down"); // add down
            }

            // Left
            if (event.code == "ArrowLeft") {
                // remove right
                const withoutRight = playerInputs.filter(x => x !== "right"); // remake copy of array
                playerInputs.length = 0; // empty array
                playerInputs.push(...withoutRight); // add back the copy of the array to the normal array; the `...` splits the array into individual arguments

                // if left already present, clear array
                if (playerInputs.includes("left")) {
                    playerInputs.length = 0; // empty array
                }
                playerInputs.push("left"); // add left
            }

            // Right
            if (event.code == "ArrowRight") {
                // remove left
                const withoutLeft = playerInputs.filter(x => x !== "left"); // remake copy of array
                playerInputs.length = 0; // empty array
                playerInputs.push(...withoutLeft); // add back the copy of the array to the normal array; the `...` splits the array into individual arguments

                // if right already present, clear array
                if (playerInputs.includes("right")) {
                    playerInputs.length = 0; // empty array
                }
                playerInputs.push("right"); // add right
            }

            // Update UI from the authoritative array
            document.getElementById("displayAction").innerText = "Action: " + playerInputs.join(" + "); // Update UI
        }

        function startMovementPhase() {
            // run the inputs for both players
            runInputs(p1, p1Input);
            runInputs(p2, p2Input);

            movementPhase = true; // start tracking physics time
            movementTime = 0; // reset timer
            runner.enabled = true; // allow movement
            phase = "movement"; // change to movement phase
        }

        function runInputs(player, input) {
            const forceMagnitude = 0.25; // amount of force when key is pressed; Cold also remove this variable and just put .25 * in forceScale but makes it less easy to read
            const forceScale = forceMagnitude * player.mass * 0.1
            console.log(forceScale)
            
            let currentOnHead = player.label == "p1" ? p1OnHead : p2OnHead // checks which is current object

            if (input.includes("jump") || input.includes("jumpOnHead")) {
                Body.applyForce(player, player.position, { x: 0, y: -2 * forceScale});
                if(currentOnHead && (player == p1)){
                    Body.applyForce(p2, p2.position, {x: 0, y: forceScale});
                }
                else if(currentOnHead && (player == p2)){
                    Body.applyForce(p1, p1.position, {x: 0, y: forceScale});
                }
            }

            if (input.includes("down")) {
                Body.applyForce(player, player.position, { x: 0, y: forceScale });
            }
            if (input.includes("left")) {
                Body.applyForce(player, player.position, { x: -forceScale, y: 0 });
                // bonus horizontal movement for moving down
                if(input.includes("down")){
                    Body.applyForce(player, player.position, { x: -0.25 * forceScale, y: 0 });
                }
                // push player in opposite direction if jumping on head
                if(input.includes("jumpOnHead")){
                    if(player == p1){
                        Body.applyForce(p2, p2.position, { x: 1.25 * forceScale, y: 0 });
                    } 
                    if(player == p2){
                        Body.applyForce(p1, p1.position, { x: 1.25 * forceScale, y: 0 });
                    }                      
                }
            }
            if (input.includes("right")) {
                Body.applyForce(player, player.position, { x: forceScale, y: 0 });
                // bonus horizontal movement for moving down
                if(input.includes("down")){
                    Body.applyForce(player, player.position, { x: 0.25 * forceScale, y: 0 });
                }
                // push player in opposite direction if jumping on head
                if(input.includes("jumpOnHead")){
                    if(player == p1){
                        Body.applyForce(p2, p2.position, { x: -1.25 * forceScale, y: 0 });
                    } 
                    if(player == p2){
                        Body.applyForce(p1, p1.position, { x: -1.25 * forceScale, y: 0 });
                    }  
                }
            }
        }
    
        // // basic mouse function template
        // const mouse = Mouse.create(render.canvas);
        // const mouseConstraint = MouseConstraint.create(engine, {
        //     mouse: mouse, // makes the object dragging the objects the mouse
        //     constraint: {
        //         stiffness: 0.1, // changes how much force is used to drag the object to the mouse
        //         render: {
        //             visible: true // lets you see the object's connection to the mouse
        //         }
        //     }
        // });

        // Add all of the bodies to the world
        World.add(engine.world, [groundHitbox, p1Sensor, p2Sensor, ground, p1, p2]);

        // Run the engine
        Runner.run(runner, engine);

        // Run the renderer
        Render.run(render);
    </script>
    </body>
</html>
