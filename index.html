<!DOCTYPE html>
<html>
    <head>
        <!-- Required meta tags -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
        <link href="style.css" rel="stylesheet" type="text/css" />
        <meta charset="UTF-8">
        <title>Matter.js Simple Example</title>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
        <style>
            body { margin: 0; overflow: hidden; }
            canvas { display: block; }
        </style>        
        <title>Title</title>
    </head>
    <body>
        <!-- HTML -->
        
        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
        <!-- <script src="script.js"></script> -->
        <script>
        // Matter.js aliases for convenience
        var Engine = Matter.Engine,
            Runner = Matter.Runner;
            Render = Matter.Render,
            World = Matter.World,
            Bodies = Matter.Bodies,
            Composite = Matter.Composite,
            Mouse = Matter.Mouse,
            MouseConstraint = Matter.MouseConstraint,
            Composites = Matter.Composites,
            Body = Matter.Body,
            Common = Matter.Common
            Constraint = Matter.Constraint;

        // Create an engine & runner
        const engine = Engine.create();
        const runner = Runner.create();


        // Create a renderer
        var render = Render.create({
            element: document.body,
            engine: engine,
            options: {
                width: 800,
                height: 600,
                wireframes: false // Set to true to see wireframes instead of solid shapes
            }
        });

        // // example of how to make a box
        // var boxA = Bodies.rectangle(400, 200, 80, 80);
        // var boxB = Bodies.rectangle(450, 50, 80, 80);

        // Make bodies here

        var ground = Bodies.rectangle(0, 590, 1610, 20, { isStatic: true }); // isStatic prevents movement
        var p1 = Bodies.rectangle(150, 400, 100, 100); // player 1
        var p2 = Bodies.rectangle(625, 400, 100, 100); // player 2

        const keys = {}; // Track which keys are down

        document.addEventListener("keydown", (event) => { // code works when key is down
            keys[event.code] = true;
        });

        document.addEventListener("keyup", (event) => { // code stops working when you stop pressing the key
            keys[event.code] = false;
        });

        var pCurrent = p1
        var spacePressed = false; // to prevent pressing space from swapping `pCurrent` every tick

        // Apply movement each tick
        Matter.Events.on(engine, "beforeUpdate", () => {
            const forceMagnitude = 0.01; // amount of force when key is pressed

            if (keys["ArrowUp"]) { // when up arrow is held down
                Body.applyForce(pCurrent, pCurrent.position, { x: 0, y: -2*forceMagnitude }); // puts the force on the shape consistently
            }
            if (keys["ArrowDown"]) {
                Body.applyForce(pCurrent, pCurrent.position, { x: 0, y: forceMagnitude });
            }
            if (keys["ArrowLeft"]) {
                Body.applyForce(pCurrent, pCurrent.position, { x: -forceMagnitude, y: 0 });
            }
            if (keys["ArrowRight"]) {
                Body.applyForce(pCurrent, pCurrent.position, { x: forceMagnitude, y: 0 });
            }

            if (keys["Space"] && !spacePressed) {
                spacePressed = true; // prevents constant toggling
                if(pCurrent == p1){
                    pCurrent = p2
                }
                else if(pCurrent == p2){
                    pCurrent = p1
                }
            }
            else if (!keys["Space"]) {
                spacePressed = false; // resets `spacePressed`
            }
        });

        // // basic mouse function template
        // const mouse = Mouse.create(render.canvas);
        // const mouseConstraint = MouseConstraint.create(engine, {
        //     mouse: mouse, // makes the object dragging the objects the mouse
        //     constraint: {
        //         stiffness: 0.1, // changes how much force is used to drag the object to the mouse
        //         render: {
        //             visible: true // lets you see the object's connection to the mouse
        //         }
        //     }
        // });

        // Add all of the bodies to the world
        World.add(engine.world, [ground, p1, p2]);

        // Run the engine
        Runner.run(runner, engine);

        // Run the renderer
        Render.run(render);
    </script>
    </body>
</html>
